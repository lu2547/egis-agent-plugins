<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <!-- 模板: 内容页 - 流程时间线 -->

    <rect width="1280" height="720" fill="#FAFAFA"/>
    <text x="72" y="86" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" fill="#333333"><tspan font-size="38" font-weight="700">{{PAGE_TITLE}}</tspan></text>
    <text x="1208" y="84" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="700" fill="#787878">{{SECTION_NAME}}</text>
    <rect x="72" y="112" width="72" height="10" rx="5" fill="#F05A23"/>
    <line x1="144" y1="117" x2="1208" y2="117" stroke="#BFBFBF" stroke-width="2"/>
    <rect x="72" y="144" width="1136" height="50" rx="4" fill="#FFF3EC"/>
    <text x="96" y="176" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="20" font-weight="700" fill="#333333">{{KEY_MESSAGE}}</text>

    <line x1="170" y1="342" x2="1110" y2="342" stroke="#FBD3BF" stroke-width="8" stroke-linecap="round"/>

    <circle cx="170" cy="342" r="34" fill="#F47A45"/>
    <text x="170" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">1</text>
    <rect x="96" y="398" width="150" height="172" rx="6" fill="#FFFFFF" stroke="#E4E4E4"/>
    <text x="120" y="432" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="17" font-weight="700" fill="#333333">{{STEP_1_TITLE}}</text>
    <text x="120" y="470" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#787878">{{STEP_1_DESC}}</text>
    <text x="120" y="520" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#787878">{{STEP_1_OUTPUT}}</text>

    <circle cx="405" cy="342" r="34" fill="#F8A06F"/>
    <text x="405" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">2</text>
    <rect x="330" y="242" width="150" height="78" rx="6" fill="#FFFFFF" stroke="#E4E4E4"/>
    <text x="354" y="274" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="17" font-weight="700" fill="#333333">{{STEP_2_TITLE}}</text>
    <text x="354" y="302" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#787878">{{STEP_2_DESC}}</text>

    <circle cx="640" cy="342" r="34" fill="#F47A45"/>
    <text x="640" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">3</text>
    <rect x="565" y="398" width="150" height="172" rx="6" fill="#FFFFFF" stroke="#E4E4E4"/>
    <text x="589" y="432" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="17" font-weight="700" fill="#333333">{{STEP_3_TITLE}}</text>
    <text x="589" y="470" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#787878">{{STEP_3_DESC}}</text>
    <text x="589" y="520" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#787878">{{STEP_3_OUTPUT}}</text>

    <circle cx="875" cy="342" r="34" fill="#F8A06F"/>
    <text x="875" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">4</text>
    <rect x="800" y="242" width="150" height="78" rx="6" fill="#FFFFFF" stroke="#E4E4E4"/>
    <text x="824" y="274" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="17" font-weight="700" fill="#333333">{{STEP_4_TITLE}}</text>
    <text x="824" y="302" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#787878">{{STEP_4_DESC}}</text>

    <circle cx="1110" cy="342" r="34" fill="#F47A45"/>
    <text x="1110" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">5</text>
    <rect x="1035" y="398" width="150" height="172" rx="6" fill="#FFFFFF" stroke="#E4E4E4"/>
    <text x="1059" y="432" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="17" font-weight="700" fill="#333333">{{STEP_5_TITLE}}</text>
    <text x="1059" y="470" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#787878">{{STEP_5_DESC}}</text>
    <text x="1059" y="520" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#787878">{{STEP_5_OUTPUT}}</text>

    <line x1="72" y1="660" x2="1208" y2="660" stroke="#DEDEDE" stroke-width="1.2"/>
    <text x="72" y="688" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#787878">数据来源：{{SOURCE}}</text>
    <text x="1208" y="688" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#787878">{{PAGE_NUM}} / {{TOTAL_PAGES}}</text>
</svg>
