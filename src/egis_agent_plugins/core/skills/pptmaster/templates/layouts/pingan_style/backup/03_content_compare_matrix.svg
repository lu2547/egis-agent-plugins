    <text x="486" y="382" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#333333">{{COL_B_POINT_2}}</text>
    <text x="486" y="446" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#333333">{{COL_B_POINT_3}}</text>
    <text x="486" y="510" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#333333">{{COL_B_POINT_4}}</text>
    <rect x="486" y="556" width="308" height="42" rx="4" fill="#FFF3EC"/>
