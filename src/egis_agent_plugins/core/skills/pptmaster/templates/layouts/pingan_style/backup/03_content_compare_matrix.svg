    <text x="876" y="318" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#333333">{{COL_C_POINT_1}}</text>
    <text x="876" y="382" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#333333">{{COL_C_POINT_2}}</text>
