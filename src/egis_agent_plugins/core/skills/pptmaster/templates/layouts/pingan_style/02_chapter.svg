<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <!-- 模板: 章节页 - Ping An Style（目录 + 当前章节高亮） -->

    <rect width="1280" height="720" fill="#FAFAFA"/>

    <text x="72" y="92" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="40" font-weight="700" fill="#333333">
        {{PAGE_TITLE}}
    </text>
    <text x="1208" y="92" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="700" fill="#F47A45">
        当前章节 {{CHAPTER_NUM}}
    </text>
    <rect x="72" y="114" width="72" height="10" rx="5" fill="#F05A23"/>
    <line x1="144" y1="119" x2="1208" y2="119" stroke="#BFBFBF" stroke-width="2"/>

    <rect x="72" y="150" width="1136" height="82" rx="4" fill="#F47A45"/>
    <text x="98" y="179" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" fill-opacity="0.9">
        当前章节
    </text>
    <text x="98" y="211" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">
        {{CHAPTER_NUM}}
    </text>
    <text x="360" y="196" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">
        {{CHAPTER_TITLE}}
    </text>
    <text x="360" y="220" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#FFFFFF" fill-opacity="0.9">
        {{CHAPTER_DESC}}
    </text>

    <rect x="72" y="264" width="536" height="72" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="1.2"/>
    <text x="98" y="309" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#F47A45">01</text>
    <text x="154" y="293" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="700" fill="#333333">{{TOC_ITEM_1_TITLE}}</text>
    <text x="154" y="318" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#787878">{{TOC_ITEM_1_DESC}}</text>

    <rect x="672" y="264" width="536" height="72" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="1.2"/>
    <text x="698" y="309" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#F47A45">02</text>
    <text x="754" y="293" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="700" fill="#333333">{{TOC_ITEM_2_TITLE}}</text>
    <text x="754" y="318" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#787878">{{TOC_ITEM_2_DESC}}</text>

    <rect x="72" y="360" width="536" height="72" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="1.2"/>
