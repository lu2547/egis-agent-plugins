    <text x="154" y="389" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="700" fill="#333333">{{TOC_ITEM_3_TITLE}}</text>
    <text x="154" y="414" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#787878">{{TOC_ITEM_3_DESC}}</text>

    <rect x="672" y="360" width="536" height="72" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="1.2"/>
    <text x="698" y="405" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#F47A45">04</text>
    <text x="754" y="389" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="700" fill="#333333">{{TOC_ITEM_4_TITLE}}</text>
    <text x="754" y="414" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#787878">{{TOC_ITEM_4_DESC}}</text>

    <rect x="72" y="456" width="536" height="72" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="1.2"/>
    <text x="98" y="501" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#F47A45">05</text>
    <text x="154" y="485" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="700" fill="#333333">{{TOC_ITEM_5_TITLE}}</text>
    <text x="154" y="510" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#787878">{{TOC_ITEM_5_DESC}}</text>

    <rect x="672" y="456" width="536" height="72" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="1.2"/>
    <text x="698" y="501" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#F47A45">06</text>
    <text x="754" y="485" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="700" fill="#333333">{{TOC_ITEM_6_TITLE}}</text>
    <text x="754" y="510" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#787878">{{TOC_ITEM_6_DESC}}</text>

    <line x1="72" y1="660" x2="1208" y2="660" stroke="#DEDEDE" stroke-width="1.2"/>
    <text x="1208" y="688" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#787878">
        {{PAGE_NUM}} / {{TOTAL_PAGES}}
    </text>
</svg>
