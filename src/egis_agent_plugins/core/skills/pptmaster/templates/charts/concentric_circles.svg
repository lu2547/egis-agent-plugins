<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <!--
    同心圆/靶心图模板
    用途: 层级聚焦、影响力/优先级圈层、核心-外围展示
    适用场景: 目标聚焦分析、利益相关者圈层、核心-拓展-生态
    支持: 4层同心圆 (推荐3-5层)
    -->

    <defs>
        <filter id="ringGlow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
            <feOffset dx="0" dy="3" result="offsetblur"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.1"/></feComponentTransfer>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
            <feOffset dx="0" dy="2" result="offsetblur"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.1"/></feComponentTransfer>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>

    <rect width="1280" height="720" fill="#FAFAFA"/>

    <!-- 标题 -->
    <text x="60" y="55" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="30" font-weight="700" fill="#333333">产品战略优先级圈层</text>
    <text x="60" y="82" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="14" fill="#7F8C8D">Concentric Model · 从核心到外围的四层聚焦</text>

    <!-- 同心圆 (居左偏, 圆心 450,395) -->
    <!-- 第4层 (最外, 生态) -->
    <circle cx="450" cy="395" r="290" fill="#C85E3D" fill-opacity="0.06" stroke="#C85E3D" stroke-width="1.5" stroke-opacity="0.2"/>
    <text x="450" y="128" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="13" font-weight="600" fill="#C85E3D" fill-opacity="0.6">生态拓展 Ecosystem</text>

    <!-- 第3层 (拓展) -->
    <circle cx="450" cy="395" r="210" fill="#C85E3D" fill-opacity="0.08" stroke="#C85E3D" stroke-width="1.5" stroke-opacity="0.25"/>
    <text x="450" y="208" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="13" font-weight="600" fill="#C85E3D" fill-opacity="0.7">增长引擎 Growth</text>

    <!-- 第2层 (核心外围) -->
    <circle cx="450" cy="395" r="135" fill="#E8B27A" fill-opacity="0.1" stroke="#E8B27A" stroke-width="2" stroke-opacity="0.3"/>
    <text x="450" y="282" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="13" font-weight="600" fill="#E07B23" fill-opacity="0.8">核心支撑 Core Support</text>

    <!-- 第1层 (核心, 最内) -->
    <circle cx="450" cy="395" r="65" fill="#A64B38" filter="url(#ringGlow)"/>
    <text x="450" y="388" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="17" font-weight="800" fill="#FFFFFF">核心</text>
    <text x="450" y="410" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="17" font-weight="800" fill="#FFFFFF">产品</text>

    <!-- 右侧说明面板 -->
    <!-- 层级1 -->
    <g filter="url(#cardShadow)">
        <rect x="800" y="115" width="420" height="100" rx="10" fill="#FFFFFF"/>
        <rect x="800" y="115" width="6" height="100" rx="3" fill="#A64B38"/>
        <circle cx="830" cy="145" r="14" fill="#A64B38"/>
        <text x="830" y="150" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
              font-size="12" font-weight="700" fill="#FFFFFF">1</text>
        <text x="856" y="149" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
              font-size="16" font-weight="700" fill="#333333">核心产品 · 最高优先级</text>
        <text x="830" y="175" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
              font-size="12" fill="#787878">用户核心体验功能，直接影响留存和付费转化</text>
        <text x="830" y="195" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
              font-size="12" fill="#8E8E8E">投入60%资源 · 每双周迭代</text>
    </g>

    <!-- 层级2 -->
    <g filter="url(#cardShadow)">
        <rect x="800" y="235" width="420" height="100" rx="10" fill="#FFFFFF"/>
        <rect x="800" y="235" width="6" height="100" rx="3" fill="#E07B23"/>
        <circle cx="830" cy="265" r="14" fill="#E07B23"/>
        <text x="830" y="270" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
              font-size="12" font-weight="700" fill="#FFFFFF">2</text>
        <text x="856" y="269" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
              font-size="16" font-weight="700" fill="#333333">核心支撑 · 高优先级</text>
        <text x="830" y="295" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
              font-size="12" fill="#787878">性能优化、安全合规、基础平台能力</text>
        <text x="830" y="315" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
              font-size="12" fill="#8E8E8E">投入25%资源 · 月度迭代</text>
    </g>

    <!-- 层级3 -->
    <g filter="url(#cardShadow)">
        <rect x="800" y="355" width="420" height="100" rx="10" fill="#FFFFFF"/>
        <rect x="800" y="355" width="6" height="100" rx="3" fill="#C85E3D"/>
        <circle cx="830" cy="385" r="14" fill="#C85E3D"/>
        <text x="830" y="390" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
              font-size="12" font-weight="700" fill="#FFFFFF">3</text>
        <text x="856" y="389" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
              font-size="16" font-weight="700" fill="#333333">增长引擎 · 中优先级</text>
        <text x="830" y="415" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
              font-size="12" fill="#787878">获客渠道建设、运营工具、商业化能力</text>
        <text x="830" y="435" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
              font-size="12" fill="#8E8E8E">投入10%资源 · 季度规划</text>
    </g>

    <!-- 层级4 -->
    <g filter="url(#cardShadow)">
        <rect x="800" y="475" width="420" height="100" rx="10" fill="#FFFFFF"/>
        <rect x="800" y="475" width="6" height="100" rx="3" fill="#C85E3D"/>
        <circle cx="830" cy="505" r="14" fill="#C85E3D"/>
        <text x="830" y="510" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
              font-size="12" font-weight="700" fill="#FFFFFF">4</text>
        <text x="856" y="509" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
              font-size="16" font-weight="700" fill="#333333">生态拓展 · 探索优先级</text>
        <text x="830" y="535" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
              font-size="12" fill="#787878">开放平台、ISV合作、行业解决方案</text>
        <text x="830" y="555" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
              font-size="12" fill="#8E8E8E">投入5%资源 · 半年度评审</text>
    </g>

    <!-- 底部注释 -->
    <text x="640" y="690" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="12" fill="#BFBFBF">越靠近圆心优先级越高，资源投入越集中</text>
</svg>