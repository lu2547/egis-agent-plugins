<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <!--
    鱼骨因果图模板 (石川图/Ishikawa)
    用途: 根因分析、问题诊断、因果关系梳理
    适用场景: 质量管理、故障分析、6M分析法
    支持: 6分支鱼骨 (推荐4-6分支)
    -->

    <defs>
        <filter id="nodeShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
            <feOffset dx="0" dy="2" result="offsetblur"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.1"/></feComponentTransfer>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>

    <rect width="1280" height="720" fill="#FAFAFA"/>

    <!-- 标题 -->
    <text x="640" y="50" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="30" font-weight="700" fill="#333333">客户流失根因分析</text>
    <text x="640" y="77" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="14" fill="#7F8C8D">Fishbone Diagram · 六大维度系统化诊断</text>

    <!-- 主脊骨 (水平线) -->
    <line x1="60" y1="380" x2="1120" y2="380" stroke="#333333" stroke-width="4" stroke-linecap="round"/>
    <!-- 鱼头 (右端三角+结果) -->
    <polygon points="1120,380 1180,340 1180,420" fill="#C0392B"/>
    <rect x="1180" y="340" width="90" height="80" rx="6" fill="#C0392B"/>
    <text x="1225" y="374" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="14" font-weight="800" fill="#FFFFFF">客户</text>
    <text x="1225" y="396" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="14" font-weight="800" fill="#FFFFFF">流失</text>

    <!-- 上方3根鱼骨 (斜向上) -->
    <!-- 骨1: 产品 (x=240) -->
    <line x1="240" y1="380" x2="160" y2="160" stroke="#A64B38" stroke-width="2.5"/>
    <rect x="100" y="110" width="120" height="40" rx="20" fill="#A64B38" filter="url(#nodeShadow)"/>
    <text x="160" y="136" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="14" font-weight="700" fill="#FFFFFF">产品</text>
    <!-- 子因 -->
    <line x1="212" y1="240" x2="160" y2="240" stroke="#A64B38" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="148" y="237" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="12" fill="#787878">功能缺失</text>
    <line x1="200" y1="290" x2="148" y2="290" stroke="#A64B38" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="136" y="287" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="12" fill="#787878">体验差</text>
    <line x1="223" y1="195" x2="171" y2="195" stroke="#A64B38" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="159" y="192" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="12" fill="#787878">Bug太多</text>

    <!-- 骨2: 服务 (x=520) -->
    <line x1="520" y1="380" x2="440" y2="160" stroke="#C85E3D" stroke-width="2.5"/>
    <rect x="380" y="110" width="120" height="40" rx="20" fill="#C85E3D" filter="url(#nodeShadow)"/>
    <text x="440" y="136" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="14" font-weight="700" fill="#FFFFFF">服务</text>
    <line x1="492" y1="240" x2="440" y2="240" stroke="#C85E3D" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="428" y="237" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="12" fill="#787878">响应慢</text>
    <line x1="480" y1="290" x2="428" y2="290" stroke="#C85E3D" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="416" y="287" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="12" fill="#787878">态度差</text>
    <line x1="503" y1="195" x2="451" y2="195" stroke="#C85E3D" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="439" y="192" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="12" fill="#787878">流程繁琐</text>

    <!-- 骨3: 价格 (x=800) -->
    <line x1="800" y1="380" x2="720" y2="160" stroke="#E8B27A" stroke-width="2.5"/>
    <rect x="660" y="110" width="120" height="40" rx="20" fill="#E07B23" filter="url(#nodeShadow)"/>
    <text x="720" y="136" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="14" font-weight="700" fill="#FFFFFF">价格</text>
    <line x1="772" y1="240" x2="720" y2="240" stroke="#E07B23" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="708" y="237" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="12" fill="#787878">性价比低</text>
    <line x1="760" y1="290" x2="708" y2="290" stroke="#E07B23" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="696" y="287" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="12" fill="#787878">涨价频繁</text>
    <line x1="783" y1="195" x2="731" y2="195" stroke="#E07B23" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="719" y="192" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="12" fill="#787878">隐性收费</text>

    <!-- 下方3根鱼骨 (斜向下) -->
    <!-- 骨4: 竞品 (x=240) -->
    <line x1="240" y1="380" x2="160" y2="600" stroke="#C85E3D" stroke-width="2.5"/>
    <rect x="100" y="600" width="120" height="40" rx="20" fill="#C85E3D" filter="url(#nodeShadow)"/>
    <text x="160" y="626" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="14" font-weight="700" fill="#FFFFFF">竞品</text>
    <line x1="212" y1="520" x2="160" y2="520" stroke="#C85E3D" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="148" y="517" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="12" fill="#787878">对手创新快</text>
    <line x1="200" y1="470" x2="148" y2="470" stroke="#C85E3D" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="136" y="467" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="12" fill="#787878">切换成本低</text>
    <line x1="223" y1="565" x2="171" y2="565" stroke="#C85E3D" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="159" y="562" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="12" fill="#787878">价格战</text>

    <!-- 骨5: 运营 (x=520) -->
    <line x1="520" y1="380" x2="440" y2="600" stroke="#C85E3D" stroke-width="2.5"/>
    <rect x="380" y="600" width="120" height="40" rx="20" fill="#C85E3D" filter="url(#nodeShadow)"/>
    <text x="440" y="626" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="14" font-weight="700" fill="#FFFFFF">运营</text>
    <line x1="492" y1="520" x2="440" y2="520" stroke="#C85E3D" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="428" y="517" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="12" fill="#787878">触达不足</text>
    <line x1="480" y1="470" x2="428" y2="470" stroke="#C85E3D" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="416" y="467" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="12" fill="#787878">预警缺失</text>
    <line x1="503" y1="565" x2="451" y2="565" stroke="#C85E3D" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="439" y="562" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="12" fill="#787878">续费引导差</text>

    <!-- 骨6: 口碑 (x=800) -->
    <line x1="800" y1="380" x2="720" y2="600" stroke="#D98A7A" stroke-width="2.5"/>
    <rect x="660" y="600" width="120" height="40" rx="20" fill="#D98A7A" filter="url(#nodeShadow)"/>
    <text x="720" y="626" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="14" font-weight="700" fill="#FFFFFF">口碑</text>
    <line x1="772" y1="520" x2="720" y2="520" stroke="#D98A7A" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="708" y="517" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="12" fill="#787878">负面评价多</text>
    <line x1="760" y1="470" x2="708" y2="470" stroke="#D98A7A" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="696" y="467" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="12" fill="#787878">社区维护差</text>
    <line x1="783" y1="565" x2="731" y2="565" stroke="#D98A7A" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="719" y="562" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="12" fill="#787878">成功案例少</text>

    <!-- 底部注释 -->
    <text x="640" y="690" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="12" fill="#BFBFBF">鱼骨图（石川图）: 系统化梳理问题的各维度根因</text>
</svg>