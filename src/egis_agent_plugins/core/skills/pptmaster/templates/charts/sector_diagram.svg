<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <!--
    扇形放射图模板
    用途: 中心主题放射、半圆分布、服务体系展示
    适用场景: 核心能力放射、服务矩阵、生态体系
    支持: 6扇区半圆 (推荐4-8个)
    -->

    <defs>
        <filter id="nodeShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
            <feOffset dx="0" dy="2" result="offsetblur"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.12"/></feComponentTransfer>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>

    <rect width="1280" height="720" fill="#FAFAFA"/>

    <!-- 标题 -->
    <text x="640" y="50" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="30" font-weight="700" fill="#333333">企业服务生态体系</text>
    <text x="640" y="77" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="14" fill="#7F8C8D">Service Ecosystem · 六大核心服务能力环绕中心平台</text>

    <!-- 半圆底座辅助 -->
    <path d="M 190,580 A 450,450 0 0,1 1090,580" fill="none" stroke="#E2E2E2" stroke-width="1.5" stroke-dasharray="6,4"/>
    <path d="M 310,580 A 330,330 0 0,1 970,580" fill="none" stroke="#E2E2E2" stroke-width="1" stroke-dasharray="4,4"/>

    <!-- 连接线 (从中心到各节点) -->
    <!-- 中心(640,540) -->
    <line x1="640" y1="490" x2="640" y2="160" stroke="#A64B38" stroke-width="2" stroke-opacity="0.25"/>
    <line x1="610" y1="495" x2="290" y2="220" stroke="#C85E3D" stroke-width="2" stroke-opacity="0.25"/>
    <line x1="670" y1="495" x2="990" y2="220" stroke="#C85E3D" stroke-width="2" stroke-opacity="0.25"/>
    <line x1="590" y1="510" x2="170" y2="420" stroke="#D98A7A" stroke-width="2" stroke-opacity="0.25"/>
    <line x1="690" y1="510" x2="1110" y2="420" stroke="#E8B27A" stroke-width="2" stroke-opacity="0.25"/>
    <line x1="580" y1="530" x2="240" y2="580" stroke="#D98A7A" stroke-width="2" stroke-opacity="0.25"/>

    <!-- 中心节点 -->
    <circle cx="640" cy="540" r="55" fill="#333333" filter="url(#nodeShadow)"/>
    <text x="640" y="533" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="16" font-weight="800" fill="#FFFFFF">核心</text>
    <text x="640" y="555" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="16" font-weight="800" fill="#FFFFFF">平台</text>

    <!-- 节点1 (顶部正上方) -->
    <circle cx="640" cy="145" r="42" fill="#A64B38" filter="url(#nodeShadow)"/>
    <text x="640" y="140" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="13" font-weight="700" fill="#FFFFFF">数据</text>
    <text x="640" y="158" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="13" font-weight="700" fill="#FFFFFF">智能</text>
    <rect x="560" y="198" width="160" height="48" rx="8" fill="#FFFFFF" filter="url(#nodeShadow)"/>
    <text x="640" y="220" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="12" fill="#787878">AI分析引擎</text>
    <text x="640" y="237" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="11" fill="#8E8E8E">实时数据洞察与预测</text>

    <!-- 节点2 (左上) -->
    <circle cx="290" cy="210" r="42" fill="#C85E3D" filter="url(#nodeShadow)"/>
    <text x="290" y="205" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="13" font-weight="700" fill="#FFFFFF">技术</text>
    <text x="290" y="223" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="13" font-weight="700" fill="#FFFFFF">研发</text>
    <rect x="210" y="263" width="160" height="48" rx="8" fill="#FFFFFF" filter="url(#nodeShadow)"/>
    <text x="290" y="285" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="12" fill="#787878">全栈技术能力</text>
    <text x="290" y="302" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="11" fill="#8E8E8E">云原生+微服务架构</text>

    <!-- 节点3 (右上) -->
    <circle cx="990" cy="210" r="42" fill="#C85E3D" filter="url(#nodeShadow)"/>
    <text x="990" y="205" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="13" font-weight="700" fill="#FFFFFF">客户</text>
    <text x="990" y="223" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="13" font-weight="700" fill="#FFFFFF">成功</text>
    <rect x="910" y="263" width="160" height="48" rx="8" fill="#FFFFFF" filter="url(#nodeShadow)"/>
    <text x="990" y="285" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="12" fill="#787878">专属客户经理</text>
    <text x="990" y="302" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="11" fill="#8E8E8E">7×24小时响应保障</text>

    <!-- 节点4 (左中) -->
    <circle cx="165" cy="410" r="42" fill="#D98A7A" filter="url(#nodeShadow)"/>
    <text x="165" y="405" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="13" font-weight="700" fill="#FFFFFF">安全</text>
    <text x="165" y="423" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="13" font-weight="700" fill="#FFFFFF">合规</text>
    <rect x="85" y="463" width="160" height="48" rx="8" fill="#FFFFFF" filter="url(#nodeShadow)"/>
    <text x="165" y="485" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="12" fill="#787878">等保三级认证</text>
    <text x="165" y="502" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="11" fill="#8E8E8E">SOC2/GDPR/ISO27001</text>

    <!-- 节点5 (右中) -->
    <circle cx="1115" cy="410" r="42" fill="#E07B23" filter="url(#nodeShadow)"/>
    <text x="1115" y="405" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="13" font-weight="700" fill="#FFFFFF">生态</text>
    <text x="1115" y="423" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="13" font-weight="700" fill="#FFFFFF">集成</text>
    <rect x="1035" y="463" width="160" height="48" rx="8" fill="#FFFFFF" filter="url(#nodeShadow)"/>
    <text x="1115" y="485" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="12" fill="#787878">200+ API接口</text>
    <text x="1115" y="502" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="11" fill="#8E8E8E">主流系统无缝对接</text>

    <!-- 节点6 (左下) -->
    <circle cx="240" cy="575" r="42" fill="#D98A7A" filter="url(#nodeShadow)"/>
    <text x="240" y="570" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="13" font-weight="700" fill="#FFFFFF">培训</text>
    <text x="240" y="588" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="13" font-weight="700" fill="#FFFFFF">赋能</text>
    <rect x="160" y="625" width="160" height="48" rx="8" fill="#FFFFFF" filter="url(#nodeShadow)"/>
    <text x="240" y="647" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="12" fill="#787878">线上线下培训</text>
    <text x="240" y="664" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
          font-size="11" fill="#8E8E8E">认证体系与知识库</text>
</svg>